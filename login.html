<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionR - Login & Register</title>
  <link rel="stylesheet" href="css/eye-monitoring-style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 1rem; }
    .login-card { width: 100%; max-width: 420px; padding: 3rem 2.5rem; text-align: center; }
    .login-input { width: 100%; padding: 14px 16px; margin-top: 8px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border-light); font-family: 'Inter', sans-serif; font-size: 14px; outline: none; box-sizing: border-box; transition: 0.2s; }
    .login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108, 93, 211, 0.1); }
    .error-msg { color: var(--danger-text); font-size: 13px; text-align: left; margin-bottom: 12px; font-weight: 500; }
  </style>
</head>
<body>

  <div class="widget-card login-card" id="loginSection">
    <div style="margin-bottom: 2.5rem;">
      <h1 style="font-size: 32px; color: var(--text-main); margin-bottom: 8px;">VisionR</h1>
      <p style="color: var(--text-muted); font-size: 14px;">Welcome back to Eye Health Portal</p>
    </div>
    <div style="text-align: left;">
      <label style="font-size: 13px; font-weight: 600; color: var(--text-main);">Email Address</label>
      <input type="email" id="loginEmail" class="login-input" placeholder="account@email.com">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <label style="font-size: 13px; font-weight: 600; color: var(--text-main);">Password</label>
      </div>
      <input type="password" id="loginPassword" class="login-input" placeholder="••••••••••••">
    </div>
    <div id="loginError" class="error-msg"></div>
    <button id="loginBtn" class="action-btn" style="width: 100%; margin-top: 8px; padding: 14px; font-size: 16px;">Secure Login</button>
    <p style="font-size: 14px; color: var(--text-muted); margin-top: 32px;">
      Don't have an account? <a href="#" id="showRegisterBtn" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create Account</a>
    </p>
  </div>

  <div class="widget-card login-card" id="registerSection" style="display: none;">
    <div style="margin-bottom: 2.5rem;">
      <h1 style="font-size: 32px; color: var(--text-main); margin-bottom: 8px;">Create Account</h1>
      <p style="color: var(--text-muted); font-size: 14px;">Join VisionR to track your eye health</p>
    </div>
    <div style="text-align: left;">
      <label style="font-size: 13px; font-weight: 600; color: var(--text-main);">Full Name</label>
      <input type="text" id="regName" class="login-input" placeholder="Full Name">
      <label style="font-size: 13px; font-weight: 600; color: var(--text-main);">Email Address</label>
      <input type="email" id="regEmail" class="login-input" placeholder="account@email.com">
      <label style="font-size: 13px; font-weight: 600; color: var(--text-main);">Password (Min. 6 Characters)</label>
      <input type="password" id="regPassword" class="login-input" placeholder="••••••••••••">
    </div>
    <div id="regError" class="error-msg"></div>
    <button id="doRegisterBtn" class="action-btn" style="width: 100%; margin-top: 8px; padding: 14px; font-size: 16px; background-color: var(--success-text);">Sign Up</button>
    <p style="font-size: 14px; color: var(--text-muted); margin-top: 32px;">
      Already have an account? <a href="#" id="showLoginBtn" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login Here</a>
    </p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="js/firebase-integration.js"></script>

  <script>
    // Elemen UI
    const loginSec = document.getElementById('loginSection');
    const registerSec = document.getElementById('registerSection');
    const loginErr = document.getElementById('loginError');
    const regErr = document.getElementById('regError');

    // Navigasi Antar Form
    document.getElementById('showRegisterBtn').onclick = (e) => {
      e.preventDefault();
      loginSec.style.display = 'none';
      registerSec.style.display = 'block';
      loginErr.textContent = '';
    };

    document.getElementById('showLoginBtn').onclick = (e) => {
      e.preventDefault();
      registerSec.style.display = 'none';
      loginSec.style.display = 'block';
      regErr.textContent = '';
    };

    // Eksekusi Login
    document.getElementById('loginBtn').onclick = () => {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      loginErr.textContent = "Authenticating...";
      window.loginUser(email, pass)
        .then(() => { window.location.href = 'dashboard.html'; })
        .catch(err => { loginErr.textContent = "Login failed: " + err.message; });
    };

    // Eksekusi Register
    document.getElementById('doRegisterBtn').onclick = () => {
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const pass = document.getElementById('regPassword').value;
      
      if(!name) { regErr.textContent = "Name cannot be empty!"; return; }
      
      regErr.textContent = "Creating account...";
      window.registerUser(name, email, pass)
        .then(() => {
          alert("Registration successful! Redirecting you to the Dashboard.");
          window.location.href = 'dashboard.html';
        })
        .catch(err => { regErr.textContent = "Registration failed: " + err.message; });
    };
  </script>
</body>
</html>
